<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 430" width="560" height="430" role="img" aria-label="Galley logo — typewriter identity, light and dark">
  <!-- Palette: ink #1C1A17 · paper(onionskin) #ECE3D0 · ribbon-red #A8362B · graphite #4A443B · muted #9A8E7E -->
  <defs>
    <style>
      .word { font-family: 'Courier Prime','Courier New',ui-monospace,monospace; font-weight: 700; letter-spacing: 2px; }
      .mark { font-family: 'Courier Prime','Courier New',ui-monospace,monospace; font-weight: 700; }
      .tag  { font-family: 'Courier Prime','Courier New',ui-monospace,monospace; font-weight: 400; letter-spacing: 5px; }
    </style>
  </defs>

  <!-- ============ LIGHT THEME · "Onionskin" ============ -->
  <rect x="0" y="0" width="560" height="215" fill="#ECE3D0"/>
  <!-- faint typed rules -->
  <line x1="34" y1="78"  x2="526" y2="78"  stroke="#4A443B" stroke-width="1" opacity="0.06"/>
  <line x1="34" y1="118" x2="526" y2="118" stroke="#4A443B" stroke-width="1" opacity="0.06"/>
  <line x1="34" y1="158" x2="526" y2="158" stroke="#4A443B" stroke-width="1" opacity="0.06"/>

  <!-- Mark: double-strike G (red ribbon ghost behind ink), on a platen baseline -->
  <text class="mark" x="62" y="142" font-size="118" fill="#A8362B">G</text>
  <text class="mark" x="58" y="138" font-size="118" fill="#1C1A17">G</text>
  <rect x="56" y="150" width="92" height="5" rx="2.5" fill="#1C1A17"/>

  <!-- Wordmark + tagline -->
  <text class="word" x="188" y="128" font-size="58" fill="#1C1A17">Galley</text>
  <text class="tag"  x="190" y="160" font-size="15" fill="#4A443B">PULL A PROOF<tspan fill="#A8362B">.</tspan></text>

  <!-- ============ DARK THEME · "Carbon" ============ -->
  <rect x="0" y="215" width="560" height="215" fill="#1C1A17"/>
  <line x1="34" y1="293" x2="526" y2="293" stroke="#ECE3D0" stroke-width="1" opacity="0.05"/>
  <line x1="34" y1="333" x2="526" y2="333" stroke="#ECE3D0" stroke-width="1" opacity="0.05"/>
  <line x1="34" y1="373" x2="526" y2="373" stroke="#ECE3D0" stroke-width="1" opacity="0.05"/>

  <text class="mark" x="62" y="357" font-size="118" fill="#A8362B">G</text>
  <text class="mark" x="58" y="353" font-size="118" fill="#ECE3D0">G</text>
  <rect x="56" y="365" width="92" height="5" rx="2.5" fill="#ECE3D0"/>

  <text class="word" x="188" y="343" font-size="58" fill="#ECE3D0">Galley</text>
  <text class="tag"  x="190" y="375" font-size="15" fill="#9A8E7E">PULL A PROOF<tspan fill="#A8362B">.</tspan></text>
</svg>
